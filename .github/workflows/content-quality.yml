name: Content Quality

on:
  pull_request:
    paths:
      - 'src/content/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run check:content
      - run: pnpm run check:links
      - run: pnpm run check:images
      - run: pnpm run check:seo
